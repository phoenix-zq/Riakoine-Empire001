services:
  riakoine_cortex:
    build: ./intelligence-cortex
    container_name: riakoine_cortex
    volumes:
      - ./intelligence-cortex:/app

  riakoine_sentry:
    image: python:3.11-slim
    container_name: riakoine_sentry
    working_dir: /app
    volumes:
      - ./intelligence-cortex:/app
      - /tmp:/tmp
    command: python sentry_news.py

  riakoine_mapper:
    image: python:3.11-slim
    container_name: riakoine_mapper
    working_dir: /app
    volumes:
      - ./intelligence-cortex:/app
    command: python StructuralMapper.py

  riakoine_precision:
    image: python:3.11-slim
    container_name: riakoine_precision
    working_dir: /app
    volumes:
      - ./intelligence-cortex:/app
    command: python precision_execution.py

  riakoine_engine:
    build: ./core-engine
    container_name: riakoine_engine
    volumes:
      - /tmp:/tmp
    network_mode: "host"

  riakoine_poly_bridge:
    image: python:3.11-slim
    container_name: riakoine_poly_bridge
    working_dir: /app
    volumes:
      - ./intelligence-cortex:/app
    command: >
      sh -c "pip install requests py-clob-client && python PolymarketBridge.py"
